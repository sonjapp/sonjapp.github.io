<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonja's Page</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #ededea;
    --white: #ffffff;
    --black: #111111;
    --accent: #534AB7;
    --radius: 16px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: var(--white);
    border-radius: var(--radius);
    max-width: 640px;
    width: 100%;
    padding: 48px 40px;
    text-align: center;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  p {
    font-size: 16px;
    line-height: 1.7;
    color: #666;
    margin-bottom: 24px;
  }
  .btn {
    display: inline-block;
    background: var(--accent);
    color: var(--white);
    padding: 12px 28px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
</style>
</head>
<body>
  <div class="card">
    <h1>Hello, Sonja!</h1>
    <p>这是我的第一个 GitHub Pages 网页。<br>修改这段文字，换成你想展示的内容吧。</p>
    <a class="btn" href="https://pages.github.com" target="_blank">了解 GitHub Pages</a>
  </div>
</body>
</html>
